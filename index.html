  <style>
    #app-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-logo {
      color: #c1a052;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 5px;
      text-align: center;
      animation: pulse 2s infinite;
    }

    .loader-logo .loader-top,
    .loader-logo .loader-bottom {
      display: block;
    }

    .loader-logo .loader-bottom {
      font-size: 1.1em;
      letter-spacing: 7px;
      margin-top: 0.15rem;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
        transform: scale(0.95);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0.5;
        transform: scale(0.95);
      }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="loader-logo">
      <span class="loader-top">Thang máy</span>
      <span class="loader-bottom">Misel</span>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('app-loader');
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }, 800);
    });
  </script>
</body>
