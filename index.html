<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>BaoThangMay - Giải Pháp Thang Máy Cao Cấp & An Toàn</title>
  <meta name="title" content="BaoThangMay - Giải Pháp Thang Máy Cao Cấp & An Toàn" />
  <meta name="description"
    content="Chuyên cung cấp, lắp đặt và bảo trì thang máy gia đình, biệt thự, công trình cao tầng. Công nghệ Châu Âu, thiết kế sang trọng, an toàn tuyệt đối." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://baothangmay.com/" />
  <meta property="og:title" content="BaoThangMay - Giải Pháp Thang Máy Cao Cấp & An Toàn" />
  <meta property="og:description"
    content="Chuyên cung cấp, lắp đặt và bảo trì thang máy gia đình, biệt thự, công trình cao tầng." />
  <meta property="og:image" content="/images/56bde9f9ba11344f6d00.jpg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    #app-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-logo {
      color: #c1a052;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
        transform: scale(0.95);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0.5;
        transform: scale(0.95);
      }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="loader-logo">BaoThangMay</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('app-loader');
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }, 800);
    });
  </script>
</body>

</html>
